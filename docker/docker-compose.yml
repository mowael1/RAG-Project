services:

  mongodb:
    image: mongo:7-jammy
    container_name: mongodb

    ports:
      - "27007:27017"

    volumes:
      - ./mongo_data:/data/db

    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}

    restart: always

    networks:
      - backend

networks:
  backend: